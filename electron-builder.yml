appId: com.auza-v2.app
productName: AUZA-v2
directories:
  output: release
files:
  - dist
  - dist-electron
asar: true
asarUnpack:
  - "!python/**"
win:
  target:
    - nsis
  # icon: resources/icons/icon.ico  # Phase 8에서 아이콘 추가 후 활성화
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
publish:
  provider: github
  owner: kimgd-123
  repo: auza
extraResources:
  - from: python
    to: python
  - from: python-embed
    to: python-embed
