appId: com.auza-v2.app
productName: AUZA-v2
directories:
  output: release
files:
  - dist
  - dist-electron
asar: true
asarUnpack:
  - "!python/**"
win:
  target:
    - nsis
    - portable
  # icon: resources/icons/icon.ico  # Phase 8에서 아이콘 추가 후 활성화
portable:
  artifactName: "${productName}-${version}-portable.exe"
nsis:
  oneClick: true
  perMachine: false
extraResources:
  - from: python
    to: python
